##### PROJECT IO #####

project:
  name: hic_ct5_20k
  genome: hg38
  pep_config: "pep/project_config_ct5_20k.yaml"
  read_type: paired

resources:
  mem_mb: 16000
  threads: 8

input:
  genome:
    assembly_name: 'hg38'
    fasta: "/home/gilberthan/disk1/database/genome/hg38/hg38.fa.gz"
    bwa_index_wildcard_path: '/home/gilberthan/disk1/database/genome/hg38/hg38.fa.gz'
    bowtie_index_path: "{database_dir}/hg38/indices_for_Bowtie2/hg38"
    chrom_sizes_path: '/home/gilberthan/disk1/database/genome/chrom_size/hg38.chrom.sizes'
  all_group: True

map:
  mapper: 'hic-tailor'
  build_bwa_index: false
  hic_tailor_bin: '/home/gilberthan/disk1/projects/prehic/target/release/hic-tailor'
  hic_tailor_enable_exact_dedup: true
  hic_tailor_dedup_radius: 3
  hic_tailor_dedup_method: 'max'
  hic_tailor_dedup_cache_backend: 'memory'
  hic_tailor_dedup_disk_path: ''
  mapping_options: ''
  cutsite: '^GATC'
  cutpattern: '^GATC'
  trim_options: ''
  use_custom_split: True

parse:
  fragment_file: "/home/gilberthan/disk1/projects/prehic/data/mboi_fragment.bed"
  make_pairsam: False
  drop_seq: True
  drop_readid: False
  keep_unparsed_bams: True
  parsing_options: '--add-columns mapq --walks-policy 5unique'
  phase:
    do_phase: False
    tag_mode: XA
    suffixes:
      - _cast
      - _129

dedup:
  max_mismatch_bp: 0
  save_by_tile_dups: True
  dedup_options: ""

scaling_pairs:
  do_scaling: True
  min_distance: 10
  max_distance: False
  n_dist_bins_decade: 10
  scaling_options: ''

bin:
  resolutions:
    - 1000000
    - 500000
    - 250000
    - 100000
    - 50000
    - 25000
    - 10000
    - 5000
    - 2000
    - 1000
  resolution_for_mustache:
    - 1000000
    - 500000
    - 250000
    - 100000
    - 50000
    - 25000
    - 10000
    - 5000
    - 2000
  balance: True
  filters:
    mapq_30: '(mapq1>=30) and (mapq2>=30)'
  make_hic: False

output_base_dir: '/home/gilberthan/disk1/projects/omic_sm/test_runs/CT5_20k_hic'

mustache:
  executable_path: "workflow/scripts/mustache.py"
  thresholds:
    1000000: "0.1"
    500000: "0.1"
    250000: "0.1"
    100000: "0.1"
    50000: "0.1"
    25000: "0.1"
    10000: "0.1"
    5000: "0.2"
    2000: "0.2"
    1000: "0.2"
  sparse_params:
    1000000: "0.88"
    500000: "0.88"
    250000: "0.88"
    100000: "0.88"
    50000: "0.88"
    25000: "0.88"
    10000: "0.88"
    5000: "0.7"
    2000: "0.7"
    1000: "0.7"
